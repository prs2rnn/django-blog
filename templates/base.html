{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The blog." />
    <meta name="color-scheme" content="light dark" />
    <title>Andrey Perestoronin | {{ title }}</title>
    <link
      rel="shortcut icon"
      href="{% static 'img/favicon.png' %}"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="{% static 'bootstrap/css/bootstrap.min.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'bootstrap/bootstrap-icons/bootstrap-icons.min.css' %}"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/pygments.css' %}" />
    <script
      src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"
      defer
    ></script>
    <script src="{% static 'js/main.js' %}" defer></script>
  </head>
  <body class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-6 col-md-8 col-sm-10">
        <nav
          class="d-flex flex-row justify-content-end border-bottom py-2 mt-4 mb-2 border-white mb-4"
          style="--bs-border-opacity: 0.1"
        >
          <div>
            <a
              class="{% if request.resolver_match.view_name == 'core:home' %}active{% endif %}"
              href="{% url 'core:home' %}"
              >home</a
            >
          </div>
          <div class="ms-3">
            <a
              class="{% if request.resolver_match.view_name == 'core:about' %}active{% endif %}"
              href="{% url 'core:about' %}"
              >about</a
            >
          </div>
          <div class="ms-3">
            <a
              class="{% if request.resolver_match.namespace == 'posts' %}active{% endif %}"
              href="{% url 'posts:list' %}"
              >blog</a
            >
          </div>
        </nav>
        <main class="mx-3 mx-md-0">
          {% block content %}{% endblock content %}
        </main>
        <footer
          class="border-top border-white py-3 text-center mt-4"
          style="--bs-border-opacity: 0.1"
        >
          <span class="muted">&copy; 2026 Andrey Perestoronin ·</span>
          <a
            href="https://github.com/prs2rnn/"
            target="_blank"
            rel="noopener noreferrer"
            >Source
          </a>
        </footer>
      </div>
    </div>
  </body>
</html>
