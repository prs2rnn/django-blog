{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The blog." />
    <title>{{ title }}</title>
    <link
      rel="shortcut icon"
      href="{% static 'img/favicon.png' %}"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="{% static 'bootstrap/css/bootstrap.min.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'bootstrap/bootstrap-icons/bootstrap-icons.min.css' %}"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <script
      src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"
      defer
    ></script>
    <script src="{% static 'js/main.js' %}" defer></script>
  </head>
  <body>
    <nav></nav>
    {% if messages %}
    <div class="container mt-3">
      {% for message in messages %}
      <div
        class="alert alert-dismissible fade show
                      {% if message.tags == 'error' %}
                        alert-danger
                      {% else %}
                        alert-{{ message.tags }}
                      {% endif %}"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    <main class="container">{% block content %}{% endblock content %}</main>
    <footer class="border-top py-4 text-center">
      <div class="container">
        <p>&copy; 2026, Andrey Perestoronin</p>
      </div>
    </footer>
  </body>
</html>
